databases:
  - name: slayz-postgres
    databaseName: slayz
    user: slayz

services:
  - type: web
    name: slayz-backend
    env: python
    runtime: python3
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn -w 1 -k uvicorn.workers.UvicornWorker app.main:app --bind 0.0.0.0:$PORT --timeout 120
    healthCheckPath: /api/health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: APP_ENV
        value: production
      - key: DEBUG
        value: "false"
      - key: DATABASE_URL
        fromDatabase:
          name: slayz-postgres
          property: connectionString
      - key: ALLOWED_EMAIL_DOMAIN
        value: slayz.com
      - key: SCHEDULER_ENABLED
        value: "true"
      - key: RUN_PIPELINE_ON_STARTUP
        value: "false"
      - key: SCRAPER_INTERVAL_MINUTES
        value: "5"
      - key: FRONTEND_BASE_URL
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
      - key: SOCKETIO_CORS_ORIGINS
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: MAIL_PROVIDER
        sync: false
      - key: MAIL_API_KEY
        sync: false
      - key: MAIL_DEFAULT_FROM
        sync: false
      - key: APP_SECRET_KEY
        generateValue: true
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: DB_ENCRYPTION_KEY
        generateValue: true
